{% extends 'core/base.html' %}

{% block title %}{{ room.name }}{% endblock %}

{% block content %}
<div class="p-10 text-center">
    <h1 class="text-3xl text-white">{{ room.name }}</h1>
</div>

<div class="w-1/2 mx-auto p-4 bg-white rounded">
    <div id="chat-messages"></div>
</div>

<div class="w-1/2 mx-auto mt-4 p-4 bg-white rounded">
    <form id="chat-form">
        <input type="text" id="chat-message-input" placeholder="Message..." class="border p-2 w-3/4">
        <button type="submit" id="chat-message-submit" class="bg-teal-600 text-white px-4 py-2">
            Send
        </button>
    </form>
</div>
{% endblock %}

{% block scripts %}
{{ room.slug|json_script:"json-roomname" }}
{{ request.user.username|json_script:"json-username" }}

<script>
    const roomName = JSON.parse(document.getElementById('json-roomname').textContent);
    const username = JSON.parse(document.getElementById('json-username').textContent);

    const chatSocket = new WebSocket(
        const protocol = window.location.protocol === "https:" ? "wss://" : "ws://";

        const chatSocket = new WebSocket(
             protocol + window.location.host + '/ws/' + roomName + '/'
);
    );

    chatSocket.onopen = function() {
        console.log("✅ Connected");
    };

    chatSocket.onmessage = function(e) {
        const data = JSON.parse(e.data);

        document.querySelector('#chat-messages').innerHTML +=
            `<p><b>${data.username}</b>: ${data.message}</p>`;
    };

    chatSocket.onerror = function(e) {
        console.log("❌ Error", e);
    };

    document.querySelector('#chat-form').onsubmit = function(e) {
        e.preventDefault();

        const input = document.querySelector('#chat-message-input');
        const message = input.value;

        if (message.trim() === '') return;

        chatSocket.send(JSON.stringify({
            'message': message,
            'username': username
        }));

        input.value = '';
    };
</script>
{% endblock %}
